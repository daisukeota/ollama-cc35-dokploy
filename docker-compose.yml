services:
  ollama:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ollama-k40c
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_GRAPH_SAFETY_MULTIPLIER=1.0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  ollama_data: